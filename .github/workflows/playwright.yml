name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # GitHub Pages deploy ke liye permissions chahiye
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # ── 1. Code checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # ── 3. Dependencies install ──────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Playwright browser install ───────────────────────────
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # ── 5. Smoke tests (fast feedback) ──────────────────────────
      - name: Run Smoke Tests
        run: npx playwright test --grep @smoke --project=chromium
        env:
          CI: true

      # ── 6. Regression tests (full suite) ────────────────────────
      - name: Run Regression Tests
        if: success()
        run: npx playwright test --grep @regression --project=chromium
        env:
          CI: true

      # ── 7. Java install (Allure CLI ke liye) ────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        if: always()
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 8. Allure CLI install ────────────────────────────────────
      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline@2.29.0
          allure --version

      # ── 9. Allure HTML report generate ──────────────────────────
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          echo "✅ Allure report generated"

      # ── 10. Allure report GitHub Pages pe deploy ─────────────────
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: .

      # ── 11. Playwright HTML report artifact ─────────────────────
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── 12. Allure results artifact ──────────────────────────────
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # ── 13. Screenshots/traces on failure ───────────────────────
      - name: Upload Test Results on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
